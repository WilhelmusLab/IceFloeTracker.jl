name: Cleanup GitHub Runner Caches
on:
  pull_request:
    types:
      - closed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cleanup
        run: |
          echo "Fetching list of cache IDs and keys"
          cacheEntriesForPR=$(gh cache list --ref $BRANCH --limit 100 --json id,key --jq '.[] | [.id, .key] | @tsv')

            if [[ -z "$cacheEntriesForPR" ]]; then
              echo "No caches found for $BRANCH"
              exit 0
            fi

          ## Setting this to not fail the workflow while deleting cache keys.
          set +e
          echo "Deleting caches..."
          while IFS=$'\t' read -r cacheId cacheKey
          do
              case "$cacheKey" in
                  tle-*|workflow-overpasses-*)
                      echo "Keeping cache $cacheKey"
                      ;;
                  *)
                      gh cache delete "$cacheId" --confirm
                      ;;
              esac
          done <<< "$cacheEntriesForPR"
          echo "Done"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge
