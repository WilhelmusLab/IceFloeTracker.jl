name: CI
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest, macos-latest]
        arch: [x64, arm64]
        exclude:
          - os: ubuntu-latest
            arch: arm64
          - os: macos-latest
            arch: x64

    steps:
      - uses: actions/checkout@v7

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Cache Watkins2026 validation dataset
        uses: actions/cache@v4
        with:
          path: /tmp/Watkins2026
          # Dataset is platform-independent, so share one cache across all OS/arch.
          key: watkins2026-${{ hashFiles('src/Data/watkins-2026.jl', 'test/*.jl') }}
          restore-keys: |
            watkins2026-

      - name: Prefetch Watkins2026 validation dataset from GCS
        run: |
          mkdir -p /tmp/Watkins2026/v0.2
          gcloud storage rsync --recursive \
            gs://ice-floe-validation-dataset/ice-floe-validation-dataset/raw/v0.2 \
            /tmp/Watkins2026/v0.2

      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
